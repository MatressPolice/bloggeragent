<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloggerAgent — AI Blog Writer</title>
  <meta name="description"
    content="Generate polished, technical blog posts in seconds with a multi-agent AI pipeline powered by Google ADK." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Highlight.js theme (matches dark/light) -->
  <link id="hljs-theme" rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />

  <style>
    /* ═══════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════ */
    :root {
      /* Spacing */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --space-3xl: 4rem;

      /* Typography */
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --text-xl: 1.25rem;
      --text-2xl: 1.5rem;
      --text-3xl: 2rem;

      /* Radius */
      --radius-sm: 0.375rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.25rem;
      --radius-full: 9999px;

      /* Transitions */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 150ms;
      --duration-normal: 300ms;
      --duration-slow: 500ms;
    }

    /* ─── Dark Theme (default) ────────────────────────── */
    [data-theme="dark"] {
      --bg-primary: hsl(222, 47%, 6%);
      --bg-secondary: hsl(222, 40%, 10%);
      --bg-surface: hsla(222, 40%, 14%, 0.6);
      --bg-surface-solid: hsl(222, 40%, 14%);
      --bg-hover: hsla(222, 40%, 18%, 0.8);
      --bg-input: hsla(222, 40%, 12%, 0.8);

      --border-subtle: hsla(220, 30%, 30%, 0.4);
      --border-default: hsla(220, 30%, 35%, 0.5);
      --border-accent: hsla(217, 91%, 60%, 0.4);

      --text-primary: hsl(210, 40%, 96%);
      --text-secondary: hsl(215, 20%, 65%);
      --text-muted: hsl(215, 15%, 50%);
      --text-inverse: hsl(222, 47%, 6%);

      --accent: hsl(217, 91%, 60%);
      --accent-hover: hsl(217, 91%, 68%);
      --accent-subtle: hsla(217, 91%, 60%, 0.12);
      --accent-glow: hsla(217, 91%, 60%, 0.25);

      --success: hsl(142, 71%, 45%);
      --success-subtle: hsla(142, 71%, 45%, 0.15);
      --warning: hsl(38, 92%, 50%);
      --warning-subtle: hsla(38, 92%, 50%, 0.15);
      --error: hsl(0, 84%, 60%);
      --error-subtle: hsla(0, 84%, 60%, 0.15);

      --shadow-sm: 0 1px 3px hsla(0, 0%, 0%, 0.3);
      --shadow-md: 0 4px 16px hsla(0, 0%, 0%, 0.3);
      --shadow-lg: 0 8px 32px hsla(0, 0%, 0%, 0.4);
      --shadow-glow: 0 0 40px var(--accent-glow);

      --glass-bg: hsla(222, 40%, 12%, 0.5);
      --glass-border: hsla(220, 30%, 30%, 0.3);
      --glass-blur: 16px;

      --gradient-hero: linear-gradient(135deg, hsla(217, 91%, 60%, 0.08) 0%, hsla(280, 80%, 60%, 0.05) 100%);
      --gradient-btn: linear-gradient(135deg, hsl(217, 91%, 55%) 0%, hsl(240, 80%, 60%) 100%);
      --gradient-btn-hover: linear-gradient(135deg, hsl(217, 91%, 62%) 0%, hsl(240, 80%, 67%) 100%);
    }

    /* ─── Light Theme ─────────────────────────────────── */
    [data-theme="light"] {
      --bg-primary: hsl(220, 20%, 97%);
      --bg-secondary: hsl(220, 20%, 94%);
      --bg-surface: hsla(0, 0%, 100%, 0.7);
      --bg-surface-solid: hsl(0, 0%, 100%);
      --bg-hover: hsla(220, 20%, 92%, 0.8);
      --bg-input: hsla(0, 0%, 100%, 0.9);

      --border-subtle: hsla(220, 20%, 80%, 0.5);
      --border-default: hsla(220, 20%, 75%, 0.6);
      --border-accent: hsla(217, 91%, 55%, 0.3);

      --text-primary: hsl(222, 47%, 11%);
      --text-secondary: hsl(215, 15%, 45%);
      --text-muted: hsl(215, 10%, 60%);
      --text-inverse: hsl(0, 0%, 100%);

      --accent: hsl(217, 91%, 50%);
      --accent-hover: hsl(217, 91%, 42%);
      --accent-subtle: hsla(217, 91%, 50%, 0.08);
      --accent-glow: hsla(217, 91%, 50%, 0.15);

      --success: hsl(142, 71%, 35%);
      --success-subtle: hsla(142, 71%, 45%, 0.1);
      --warning: hsl(38, 92%, 45%);
      --warning-subtle: hsla(38, 92%, 50%, 0.1);
      --error: hsl(0, 84%, 50%);
      --error-subtle: hsla(0, 84%, 60%, 0.1);

      --shadow-sm: 0 1px 3px hsla(220, 20%, 50%, 0.1);
      --shadow-md: 0 4px 16px hsla(220, 20%, 50%, 0.12);
      --shadow-lg: 0 8px 32px hsla(220, 20%, 50%, 0.15);
      --shadow-glow: 0 0 40px var(--accent-glow);

      --glass-bg: hsla(0, 0%, 100%, 0.6);
      --glass-border: hsla(220, 20%, 80%, 0.4);
      --glass-blur: 16px;

      --gradient-hero: linear-gradient(135deg, hsla(217, 91%, 55%, 0.06) 0%, hsla(280, 80%, 60%, 0.03) 100%);
      --gradient-btn: linear-gradient(135deg, hsl(217, 91%, 50%) 0%, hsl(240, 80%, 55%) 100%);
      --gradient-btn-hover: linear-gradient(135deg, hsl(217, 91%, 42%) 0%, hsl(240, 80%, 48%) 100%);
    }

    /* ═══════════════════════════════════════════════════
   BASE RESET & GLOBALS
   ═══════════════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background var(--duration-normal) var(--ease-out),
        color var(--duration-normal) var(--ease-out);
    }

    /* ═══════════════════════════════════════════════════
   AMBIENT BACKGROUND
   ═══════════════════════════════════════════════════ */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse 600px 400px at 20% 20%, hsla(217, 91%, 60%, 0.06) 0%, transparent 70%),
        radial-gradient(ellipse 500px 350px at 80% 80%, hsla(280, 80%, 60%, 0.04) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 50% 50%, hsla(160, 70%, 50%, 0.03) 0%, transparent 70%);
      animation: ambientDrift 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes ambientDrift {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      100% {
        transform: translate(30px, -20px) rotate(3deg);
      }
    }

    /* ═══════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════ */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-xl);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--glass-border);
    }

    .app-logo {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
    }

    .app-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--gradient-btn);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .theme-toggle {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: var(--text-lg);
      color: var(--text-secondary);
      transition: all var(--duration-fast) var(--ease-out);
    }

    .theme-toggle:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-default);
      transform: scale(1.05);
    }

    /* ═══════════════════════════════════════════════════
   MAIN CONTAINER
   ═══════════════════════════════════════════════════ */
    .main-content {
      flex: 1;
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      padding: var(--space-2xl) var(--space-xl);
      position: relative;
      z-index: 1;
    }

    /* ═══════════════════════════════════════════════════
   GLASS CARD
   ═══════════════════════════════════════════════════ */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      box-shadow: var(--shadow-md);
      transition: all var(--duration-normal) var(--ease-out);
    }

    /* ═══════════════════════════════════════════════════
   HERO / INPUT SECTION
   ═══════════════════════════════════════════════════ */
    .hero-section {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .hero-title {
      font-size: var(--text-3xl);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-sm);
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto;
    }

    .input-card {
      margin-bottom: var(--space-xl);
      background: var(--gradient-hero);
      position: relative;
      overflow: hidden;
    }

    .input-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      z-index: 0;
    }

    .input-card>* {
      position: relative;
      z-index: 1;
    }

    .input-group {
      display: flex;
      gap: var(--space-md);
      align-items: stretch;
    }

    .topic-input {
      flex: 1;
      padding: var(--space-md) var(--space-lg);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      color: var(--text-primary);
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      outline: none;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .topic-input::placeholder {
      color: var(--text-muted);
    }

    .topic-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle), var(--shadow-sm);
    }

    .generate-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-md) var(--space-xl);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 600;
      color: white;
      background: var(--gradient-btn);
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--duration-fast) var(--ease-out);
      box-shadow: var(--shadow-sm);
    }

    .generate-btn:hover:not(:disabled) {
      background: var(--gradient-btn-hover);
      box-shadow: var(--shadow-md), var(--shadow-glow);
      transform: translateY(-1px);
    }

    .generate-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .generate-btn .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid hsla(0, 0%, 100%, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .generate-btn.loading .btn-text {
      display: none;
    }

    .generate-btn.loading .btn-spinner {
      display: block;
    }

    .generate-btn.loading .btn-icon {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ═══════════════════════════════════════════════════
   STEPPER / PROGRESS
   ═══════════════════════════════════════════════════ */
    .stepper-card {
      margin-bottom: var(--space-xl);
      display: none;
    }

    .stepper-card.visible {
      display: block;
      animation: fadeSlideIn var(--duration-normal) var(--ease-out);
    }

    .stepper {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .step {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-sm) 0;
    }

    .step-indicator {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      font-weight: 600;
      flex-shrink: 0;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .step.pending .step-indicator {
      background: var(--bg-surface);
      border: 2px solid var(--border-subtle);
      color: var(--text-muted);
    }

    .step.active .step-indicator {
      background: var(--accent-subtle);
      border: 2px solid var(--accent);
      color: var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .step.complete .step-indicator {
      background: var(--success-subtle);
      border: 2px solid var(--success);
      color: var(--success);
    }

    .step-label {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      transition: color var(--duration-fast);
    }

    .step.active .step-label {
      color: var(--text-primary);
      font-weight: 600;
    }

    .step.complete .step-label {
      color: var(--success);
    }

    .step-elapsed {
      margin-left: auto;
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 var(--accent-glow);
      }

      50% {
        box-shadow: 0 0 0 8px transparent;
      }
    }

    /* ═══════════════════════════════════════════════════
   ARTICLE OUTPUT
   ═══════════════════════════════════════════════════ */
    .output-card {
      display: none;
      position: relative;
    }

    .output-card.visible {
      display: block;
      animation: fadeSlideIn var(--duration-slow) var(--ease-out);
    }

    .output-actions {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-lg);
      border-bottom: 1px solid var(--border-subtle);
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .action-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-default);
    }

    .action-btn.copied {
      color: var(--success);
      border-color: var(--success);
      background: var(--success-subtle);
    }

    /* ─── Rendered Markdown Article ───────────────────── */
    .article-body {
      line-height: 1.8;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .article-body h1 {
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: var(--space-xl) 0 var(--space-md);
      padding-bottom: var(--space-sm);
      border-bottom: 2px solid var(--border-subtle);
      background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .article-body h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: var(--space-xl) 0 var(--space-md);
      color: var(--text-primary);
    }

    .article-body h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: var(--space-lg) 0 var(--space-sm);
      color: var(--text-primary);
    }

    .article-body p {
      margin-bottom: var(--space-md);
      color: var(--text-secondary);
    }

    .article-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .article-body a:hover {
      color: var(--accent-hover);
    }

    .article-body ul,
    .article-body ol {
      margin-bottom: var(--space-md);
      padding-left: var(--space-xl);
    }

    .article-body li {
      margin-bottom: var(--space-xs);
      color: var(--text-secondary);
    }

    .article-body li::marker {
      color: var(--accent);
    }

    .article-body blockquote {
      margin: var(--space-md) 0;
      padding: var(--space-md) var(--space-lg);
      border-left: 3px solid var(--accent);
      background: var(--accent-subtle);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    .article-body code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      padding: 0.15em 0.4em;
      background: var(--bg-surface-solid);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--accent);
    }

    .article-body pre {
      margin: var(--space-md) 0;
      border-radius: var(--radius-md);
      overflow-x: auto;
      border: 1px solid var(--border-subtle);
    }

    .article-body pre code {
      display: block;
      padding: var(--space-lg);
      background: var(--bg-surface-solid);
      border: none;
      border-radius: 0;
      color: var(--text-primary);
      font-size: var(--text-sm);
      line-height: 1.7;
    }

    .article-body strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .article-body hr {
      border: none;
      height: 1px;
      background: var(--border-subtle);
      margin: var(--space-xl) 0;
    }

    .article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--space-md) 0;
      font-size: var(--text-sm);
    }

    .article-body th,
    .article-body td {
      padding: var(--space-sm) var(--space-md);
      border: 1px solid var(--border-subtle);
      text-align: left;
    }

    .article-body th {
      background: var(--bg-surface-solid);
      font-weight: 600;
      color: var(--text-primary);
    }

    .article-body td {
      color: var(--text-secondary);
    }

    /* ─── Skeleton / Shimmer ──────────────────────────── */
    .skeleton-container {
      display: none;
    }

    .skeleton-container.visible {
      display: block;
      animation: fadeSlideIn var(--duration-normal) var(--ease-out);
    }

    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg,
          var(--bg-surface-solid) 25%,
          var(--bg-hover) 50%,
          var(--bg-surface-solid) 75%);
      background-size: 400% 100%;
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-sm);
      animation: shimmer 1.8s ease-in-out infinite;
    }

    .skeleton-line:nth-child(1) {
      width: 55%;
      height: 22px;
      margin-bottom: var(--space-lg);
    }

    .skeleton-line:nth-child(2) {
      width: 100%;
    }

    .skeleton-line:nth-child(3) {
      width: 92%;
    }

    .skeleton-line:nth-child(4) {
      width: 87%;
    }

    .skeleton-line:nth-child(5) {
      width: 40%;
      margin-bottom: var(--space-lg);
    }

    .skeleton-line:nth-child(6) {
      width: 45%;
      height: 18px;
      margin-bottom: var(--space-md);
    }

    .skeleton-line:nth-child(7) {
      width: 100%;
    }

    .skeleton-line:nth-child(8) {
      width: 95%;
    }

    .skeleton-line:nth-child(9) {
      width: 78%;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    /* ═══════════════════════════════════════════════════
   ERROR BANNER
   ═══════════════════════════════════════════════════ */
    .error-banner {
      display: none;
      padding: var(--space-md) var(--space-lg);
      background: var(--error-subtle);
      border: 1px solid var(--error);
      border-radius: var(--radius-md);
      color: var(--error);
      font-size: var(--text-sm);
      font-weight: 500;
      margin-bottom: var(--space-xl);
      animation: fadeSlideIn var(--duration-normal) var(--ease-out);
    }

    .error-banner.visible {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    /* ═══════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════ */
    .app-footer {
      text-align: center;
      padding: var(--space-xl);
      font-size: var(--text-sm);
      color: var(--text-muted);
      border-top: 1px solid var(--border-subtle);
      position: relative;
      z-index: 1;
    }

    .app-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .app-footer a:hover {
      text-decoration: underline;
    }

    /* ═══════════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════════ */
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════ */
    @media (max-width: 640px) {
      .main-content {
        padding: var(--space-lg) var(--space-md);
      }

      .hero-title {
        font-size: var(--text-2xl);
      }

      .hero-subtitle {
        font-size: var(--text-base);
      }

      .input-group {
        flex-direction: column;
      }

      .generate-btn {
        justify-content: center;
      }

      .output-actions {
        flex-wrap: wrap;
      }

      .glass-card {
        padding: var(--space-lg);
        border-radius: var(--radius-lg);
      }
    }
  </style>
</head>

<body>

  <!-- ═══ HEADER ═══ -->
  <header class="app-header">
    <a href="#" class="app-logo">
      <span class="app-logo-icon">✦</span>
      <span>BloggerAgent</span>
    </a>
    <button id="themeToggle" class="theme-toggle" title="Toggle theme" aria-label="Toggle dark/light theme">
      🌙
    </button>
  </header>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="main-content">

    <!-- Hero -->
    <section class="hero-section">
      <h1 class="hero-title">What should I write about?</h1>
      <p class="hero-subtitle">Enter a topic and the AI agent pipeline will plan, write, and polish a full article for
        you.</p>
    </section>

    <!-- Input Card -->
    <div class="input-card glass-card">
      <form id="generateForm" class="input-group">
        <input type="text" id="topicInput" class="topic-input" placeholder="e.g. Kubernetes autoscaling best practices"
          required autocomplete="off" aria-label="Blog topic" />
        <button type="submit" id="generateBtn" class="generate-btn">
          <span class="btn-icon">✦</span>
          <span class="btn-text">Generate</span>
          <span class="btn-spinner"></span>
        </button>
      </form>
    </div>

    <!-- Error Banner -->
    <div id="errorBanner" class="error-banner" role="alert">
      <span>⚠</span>
      <span id="errorMessage"></span>
    </div>

    <!-- Stepper -->
    <div id="stepperCard" class="stepper-card glass-card">
      <div class="stepper">
        <div class="step pending" id="stepPlan">
          <div class="step-indicator">1</div>
          <span class="step-label">Planning outline…</span>
          <span class="step-elapsed" id="stepPlanTime"></span>
        </div>
        <div class="step pending" id="stepWrite">
          <div class="step-indicator">2</div>
          <span class="step-label">Writing article…</span>
          <span class="step-elapsed" id="stepWriteTime"></span>
        </div>
        <div class="step pending" id="stepFinalize">
          <div class="step-indicator">3</div>
          <span class="step-label">Finalizing & formatting…</span>
          <span class="step-elapsed" id="stepFinalizeTime"></span>
        </div>
      </div>
    </div>

    <!-- Skeleton Loader -->
    <div id="skeletonLoader" class="skeleton-container glass-card">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>

    <!-- Article Output -->
    <div id="outputCard" class="output-card glass-card">
      <div class="output-actions">
        <button id="copyBtn" class="action-btn" title="Copy raw Markdown to clipboard">
          <span id="copyIcon">📋</span> <span id="copyLabel">Copy Markdown</span>
        </button>
        <button id="downloadBtn" class="action-btn" title="Download as .md file">
          📥 Download .md
        </button>
      </div>
      <div id="articleBody" class="article-body"></div>
    </div>

  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer class="app-footer">
    Built with <a href="https://google.github.io/adk-docs/" target="_blank" rel="noopener">Google ADK</a> · Multi-agent
    AI pipeline · © 2026
  </footer>

  <!-- ═══ DEPENDENCIES ═══ -->
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>

  <script>
    /* ═══════════════════════════════════════════════════
       CONFIGURATION — CLOUD RUN URL
       ═══════════════════════════════════════════════════ */
    const currentOrigin = window.location.origin;
    // If opened as a local file, fallback to the hardcoded production URL. 
    // Otherwise, dynamically use the current domain (for when it's deployed!).
    const CLOUD_RUN_URL = (currentOrigin === "file://" || currentOrigin === "null" || !currentOrigin) 
      ? "https://adk-default-service-name-122956929515.us-west1.run.app" 
      : currentOrigin;
    const APP_NAME = "app";
    const USER_ID = "web-user";

    /* ═══════════════════════════════════════════════════
       DOM REFERENCES
       ═══════════════════════════════════════════════════ */
    const $ = (sel) => document.querySelector(sel);
    const form = $("#generateForm");
    const topicInput = $("#topicInput");
    const generateBtn = $("#generateBtn");
    const stepperCard = $("#stepperCard");
    const skeletonEl = $("#skeletonLoader");
    const outputCard = $("#outputCard");
    const articleBody = $("#articleBody");
    const errorBanner = $("#errorBanner");
    const errorMessage = $("#errorMessage");
    const copyBtn = $("#copyBtn");
    const copyIcon = $("#copyIcon");
    const copyLabel = $("#copyLabel");
    const downloadBtn = $("#downloadBtn");
    const themeToggle = $("#themeToggle");

    const stepEls = {
      plan: { el: $("#stepPlan"), timeEl: $("#stepPlanTime") },
      write: { el: $("#stepWrite"), timeEl: $("#stepWriteTime") },
      finalize: { el: $("#stepFinalize"), timeEl: $("#stepFinalizeTime") },
    };

    /* ═══════════════════════════════════════════════════
       STATE
       ═══════════════════════════════════════════════════ */
    let rawMarkdown = "";
    let isGenerating = false;
    let generationStartTime = null;
    let activeStepKey = null;
    let stepTimers = {};

    /* ═══════════════════════════════════════════════════
       THEME TOGGLE
       ═══════════════════════════════════════════════════ */
    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "dark" ? "🌙" : "☀️";
      const hljsLink = $("#hljs-theme");
      hljsLink.href = theme === "dark"
        ? "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
        : "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css";
      localStorage.setItem("theme", theme);
    }

    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      setTheme(current === "dark" ? "light" : "dark");
    });

    // Restore saved theme
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) setTheme(savedTheme);

    /* ═══════════════════════════════════════════════════
       UI HELPERS
       ═══════════════════════════════════════════════════ */
    function showError(msg) {
      errorMessage.textContent = msg;
      errorBanner.classList.add("visible");
    }

    function hideError() {
      errorBanner.classList.remove("visible");
    }

    function setLoading(loading) {
      isGenerating = loading;
      generateBtn.disabled = loading;
      generateBtn.classList.toggle("loading", loading);
      topicInput.disabled = loading;
    }

    function resetUI() {
      hideError();
      outputCard.classList.remove("visible");
      skeletonEl.classList.remove("visible");
      stepperCard.classList.remove("visible");
      articleBody.innerHTML = "";
      rawMarkdown = "";
      activeStepKey = null;
      Object.values(stepTimers).forEach(clearInterval);
      stepTimers = {};
      Object.values(stepEls).forEach(({ el, timeEl }) => {
        el.className = "step pending";
        el.querySelector(".step-indicator").textContent =
          el === stepEls.plan.el ? "1" : el === stepEls.write.el ? "2" : "3";
        timeEl.textContent = "";
      });
    }

    function formatElapsed(ms) {
      const s = Math.floor(ms / 1000);
      return s < 60 ? `${s}s` : `${Math.floor(s / 60)}m ${s % 60}s`;
    }

    /* ═══════════════════════════════════════════════════
       STEPPER LOGIC
       ═══════════════════════════════════════════════════ */

    // Map ADK event.author names to our stepper keys
    function authorToStepKey(author) {
      if (!author) return null;
      const a = author.toLowerCase();
      if (/planner|plan|outline|validation/.test(a)) return "plan";
      if (/writer|write|blog/.test(a)) return "write";
      if (/blogger|root|orchestrat/.test(a)) return "finalize";
      return null;
    }

    function activateStep(key) {
      if (!key || key === activeStepKey) return;

      // Complete previous step
      if (activeStepKey && stepEls[activeStepKey]) {
        const prev = stepEls[activeStepKey];
        prev.el.className = "step complete";
        prev.el.querySelector(".step-indicator").textContent = "✓";
        if (stepTimers[activeStepKey]) {
          clearInterval(stepTimers[activeStepKey]);
        }
      }

      // Activate new step
      activeStepKey = key;
      const curr = stepEls[key];
      if (!curr) return;
      curr.el.className = "step active";
      curr.el.querySelector(".step-indicator").textContent = "●";

      const stepStart = Date.now();
      stepTimers[key] = setInterval(() => {
        curr.timeEl.textContent = formatElapsed(Date.now() - stepStart);
      }, 500);
    }

    function completeAllSteps() {
      Object.entries(stepEls).forEach(([key, { el, timeEl }]) => {
        el.className = "step complete";
        el.querySelector(".step-indicator").textContent = "✓";
        if (stepTimers[key]) clearInterval(stepTimers[key]);
      });
    }

    /* ═══════════════════════════════════════════════════
       CORE: GENERATE ARTICLE VIA SSE
       ═══════════════════════════════════════════════════ */
    async function createSession() {
      const response = await fetch(`${CLOUD_RUN_URL}/apps/${APP_NAME}/users/${USER_ID}/sessions`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({})
      });
      if (!response.ok) {
        throw new Error(`Failed to create session: ${response.status} ${response.statusText}`);
      }
      const data = await response.json();
      return data.id;
    }

    async function generateArticle(topic) {
      resetUI();
      setLoading(true);
      stepperCard.classList.add("visible");
      skeletonEl.classList.add("visible");
      generationStartTime = Date.now();

      // Start at the planning step
      activateStep("plan");

      try {
        const sessionId = await createSession();

        const response = await fetch(`${CLOUD_RUN_URL}/run_sse`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            app_name: APP_NAME,
            user_id: USER_ID,
            session_id: sessionId,
            new_message: {
              role: "user",
              parts: [{ text: topic }],
            },
          }),
        });

        if (!response.ok) {
          throw new Error(`API returned ${response.status}: ${response.statusText}`);
        }

        // ── Parse the SSE stream ──────────────────────
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let lastAuthor = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop(); // keep incomplete line in buffer

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const jsonStr = line.slice(6).trim();
            if (!jsonStr || jsonStr === "[DONE]") continue;

            try {
              const event = JSON.parse(jsonStr);

              // Update stepper based on author
              if (event.author && event.author !== lastAuthor) {
                lastAuthor = event.author;
                const stepKey = authorToStepKey(event.author);
                if (stepKey) activateStep(stepKey);
              }

              // Extract text content
              const text = event?.content?.parts?.[0]?.text;
              if (text) {
                rawMarkdown = text; // ADK sends cumulative text, not deltas
                renderArticlePreview(rawMarkdown);
              }
            } catch (e) {
              // Skip malformed SSE events
            }
          }
        }

        // ── Stream complete ───────────────────────────
        skeletonEl.classList.remove("visible");
        completeAllSteps();

        if (rawMarkdown) {
          renderFinalArticle(rawMarkdown);
          outputCard.classList.add("visible");
        } else {
          showError("The agent returned an empty response. Please try a different topic.");
        }

      } catch (err) {
        skeletonEl.classList.remove("visible");
        if (CLOUD_RUN_URL === "YOUR_CLOUD_RUN_URL_HERE") {
          showError("You haven't set your Cloud Run URL yet. Open this file and replace YOUR_CLOUD_RUN_URL_HERE near the top of the <script> block.");
        } else {
          showError(`Connection failed: ${err.message}`);
        }
        console.error("BloggerAgent error:", err);
      } finally {
        setLoading(false);
      }
    }

    /* ═══════════════════════════════════════════════════
       MARKDOWN RENDERING
       ═══════════════════════════════════════════════════ */
    function renderArticlePreview(md) {
      skeletonEl.classList.remove("visible");
      outputCard.classList.add("visible");
      articleBody.innerHTML = DOMPurify.sanitize(marked.parse(md));
    }

    function renderFinalArticle(md) {
      articleBody.innerHTML = DOMPurify.sanitize(marked.parse(md));
      // Apply syntax highlighting to all code blocks
      articleBody.querySelectorAll("pre code").forEach((block) => {
        hljs.highlightElement(block);
      });
    }

    /* ═══════════════════════════════════════════════════
       COPY & DOWNLOAD
       ═══════════════════════════════════════════════════ */
    copyBtn.addEventListener("click", async () => {
      if (!rawMarkdown) return;
      try {
        await navigator.clipboard.writeText(rawMarkdown);
        copyIcon.textContent = "✓";
        copyLabel.textContent = "Copied!";
        copyBtn.classList.add("copied");
        setTimeout(() => {
          copyIcon.textContent = "📋";
          copyLabel.textContent = "Copy Markdown";
          copyBtn.classList.remove("copied");
        }, 2000);
      } catch {
        // Fallback for file:// protocol where clipboard API may not work
        const textarea = document.createElement("textarea");
        textarea.value = rawMarkdown;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        copyIcon.textContent = "✓";
        copyLabel.textContent = "Copied!";
        copyBtn.classList.add("copied");
        setTimeout(() => {
          copyIcon.textContent = "📋";
          copyLabel.textContent = "Copy Markdown";
          copyBtn.classList.remove("copied");
        }, 2000);
      }
    });

    downloadBtn.addEventListener("click", () => {
      if (!rawMarkdown) return;
      const blob = new Blob([rawMarkdown], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      // Create filename from first heading or topic
      const titleMatch = rawMarkdown.match(/^#\s+(.+)$/m);
      const filename = titleMatch
        ? titleMatch[1].replace(/[^a-zA-Z0-9\s-]/g, "").trim().replace(/\s+/g, "-").toLowerCase().slice(0, 60)
        : "blog-post";
      a.download = `${filename}.md`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    /* ═══════════════════════════════════════════════════
       FORM HANDLER
       ═══════════════════════════════════════════════════ */
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (isGenerating) return;
      const topic = topicInput.value.trim();
      if (!topic) return;
      generateArticle(topic);
    });

    // Allow Ctrl+Enter to submit
    topicInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        form.dispatchEvent(new Event("submit"));
      }
    });

    // STARTUP CHECK (Removed: now handles domain dynamically)
  </script>

</body>

</html>
